<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">PE Labs workflow overview</title>
  <desc id="desc">A warm dashboard-style illustration showing company intelligence, deterministic screening and relationship drafting for a synthetic private equity workflow.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f3e8"/>
      <stop offset="52%" stop-color="#f1e6d1"/>
      <stop offset="100%" stop-color="#d8e4d4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f6ead7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#4d3d2f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#sky)"/>
  <path d="M0 384 C160 320 284 344 410 304 C554 258 684 288 812 250 C952 208 1058 230 1200 174 L1200 560 L0 560 Z" fill="#b7c8ad" opacity="0.56"/>
  <path d="M0 432 C142 384 248 400 390 366 C526 334 652 348 802 310 C966 270 1078 292 1200 248 L1200 560 L0 560 Z" fill="#8fa383" opacity="0.55"/>
  <path d="M0 482 C174 444 310 466 462 428 C612 390 714 420 870 382 C1028 342 1116 360 1200 334 L1200 560 L0 560 Z" fill="#6f8566" opacity="0.42"/>

  <g transform="translate(70 68)">
    <text x="0" y="0" fill="#31443a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">PE LABS</text>
    <text x="0" y="58" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">From company intelligence</text>
    <text x="0" y="116" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">to investment action</text>
    <text x="2" y="162" fill="#4b5b51" font-family="Inter, Arial, sans-serif" font-size="21">A synthetic, inspectable private equity workflow for screening and outreach.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="70" y="286" width="262" height="156" rx="18" fill="url(#panel)" stroke="#dec8a7"/>
    <text x="94" y="326" fill="#7b543a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.5">01 FIND</text>
    <text x="94" y="356" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Company</text>
    <text x="94" y="384" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">intelligence</text>
    <text x="94" y="408" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="16">20 synthetic European</text>
    <text x="94" y="432" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="16">technology companies</text>
    <circle cx="286" cy="322" r="22" fill="#d9e6d2"/>
    <path d="M276 321 h20 M286 311 v20" stroke="#315a49" stroke-width="3" stroke-linecap="round"/>

    <rect x="366" y="286" width="262" height="156" rx="18" fill="url(#panel)" stroke="#dec8a7"/>
    <text x="390" y="326" fill="#7b543a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.5">02 SCREEN</text>
    <text x="390" y="358" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Visible scoring</text>
    <text x="390" y="392" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="16">5 gates, 8 dimensions,</text>
    <text x="390" y="416" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="16">10-point deterministic score</text>
    <path d="M564 337 l16 16 l30 -38" fill="none" stroke="#315a49" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="662" y="286" width="262" height="156" rx="18" fill="url(#panel)" stroke="#dec8a7"/>
    <text x="686" y="326" fill="#7b543a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.5">03 ENGAGE</text>
    <text x="686" y="358" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Draft with context</text>
    <text x="686" y="392" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="16">Mock default, optional</text>
    <text x="686" y="416" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="16">server-side OpenAI provider</text>
    <rect x="854" y="316" width="38" height="30" rx="5" fill="#d9e6d2" stroke="#315a49" stroke-width="3"/>
    <path d="M854 318 l19 17 l19 -17" fill="none" stroke="#315a49" stroke-width="3"/>
  </g>

  <g transform="translate(974 286)" filter="url(#softShadow)">
    <rect width="156" height="156" rx="78" fill="#263a31"/>
    <text x="78" y="58" text-anchor="middle" fill="#f5ead7" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">16</text>
    <text x="78" y="86" text-anchor="middle" fill="#f5ead7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">qualified</text>
    <text x="78" y="113" text-anchor="middle" fill="#c9d8c3" font-family="Inter, Arial, sans-serif" font-size="14">6 high priority</text>
  </g>

  <path d="M332 364 h34 M628 364 h34 M924 364 h50" fill="none" stroke="#315a49" stroke-width="4" stroke-dasharray="8 8" opacity="0.72"/>
</svg>
