<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic universe and screening distribution</title>
  <desc id="desc">A chart showing 20 synthetic companies, 16 qualified, 6 high priority, 9 attractive, 1 watch and 4 disqualified.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf7ee"/>
      <stop offset="100%" stop-color="#eef4ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#4d3d2f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="24" fill="url(#bg)"/>
  <text x="58" y="76" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Current synthetic universe</text>
  <text x="58" y="112" fill="#52655a" font-family="Inter, Arial, sans-serif" font-size="18">Screening output verified from the TypeScript modules.</text>

  <g transform="translate(58 156)" filter="url(#shadow)">
    <rect width="252" height="286" rx="18" fill="#fffaf0" stroke="#dfc9aa"/>
    <text x="28" y="54" fill="#7b543a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.4">UNIVERSE</text>
    <text x="28" y="118" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">20</text>
    <text x="28" y="154" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="18">synthetic companies</text>
    <text x="28" y="194" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="16">European technology</text>
    <text x="28" y="220" fill="#536358" font-family="Inter, Arial, sans-serif" font-size="16">and software universe</text>
  </g>

  <g transform="translate(350 156)" filter="url(#shadow)">
    <rect width="792" height="286" rx="18" fill="#fffaf0" stroke="#dfc9aa"/>
    <text x="32" y="54" fill="#7b543a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.4">SCREENING DISTRIBUTION</text>

    <text x="32" y="104" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">High priority</text>
    <rect x="190" y="82" width="420" height="30" rx="15" fill="#d9e6d2"/>
    <rect x="190" y="82" width="280" height="30" rx="15" fill="#315a49"/>
    <text x="632" y="104" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">6</text>

    <text x="32" y="152" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Attractive</text>
    <rect x="190" y="130" width="420" height="30" rx="15" fill="#ead9bf"/>
    <rect x="190" y="130" width="420" height="30" rx="15" fill="#a56b45"/>
    <text x="632" y="152" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">9</text>

    <text x="32" y="200" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Watch</text>
    <rect x="190" y="178" width="420" height="30" rx="15" fill="#ead9bf"/>
    <rect x="190" y="178" width="47" height="30" rx="15" fill="#c9a14a"/>
    <text x="632" y="200" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">1</text>

    <text x="32" y="248" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Disqualified</text>
    <rect x="190" y="226" width="420" height="30" rx="15" fill="#ead9bf"/>
    <rect x="190" y="226" width="187" height="30" rx="15" fill="#6c6f64"/>
    <text x="632" y="248" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">4</text>
  </g>

  <g transform="translate(58 472)">
    <rect x="0" y="-6" width="1084" height="1" fill="#d6c5a7"/>
    <text x="0" y="34" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">16 qualified</text>
    <text x="160" y="34" fill="#52655a" font-family="Inter, Arial, sans-serif" font-size="18">5 hard gates passed</text>
    <text x="426" y="34" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">7.8 median score</text>
    <text x="640" y="34" fill="#52655a" font-family="Inter, Arial, sans-serif" font-size="18">8 dimensions on a 10-point scale</text>
  </g>
</svg>
