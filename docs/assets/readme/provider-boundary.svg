<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Relationship drafting provider boundary</title>
  <desc id="desc">A diagram showing browser form input flowing through an API route, Zod validation and provider resolver into either a mock provider or optional OpenAI provider.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf7ee"/>
      <stop offset="100%" stop-color="#e7efe3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#4d3d2f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="540" rx="24" fill="url(#bg)"/>
  <text x="58" y="76" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Drafting boundary</text>
  <text x="58" y="112" fill="#52655a" font-family="Inter, Arial, sans-serif" font-size="18">Language generation is optional, server-side and schema-checked.</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="58" y="180" width="196" height="144" rx="18" fill="#fffaf0" stroke="#dfc9aa"/>
    <text x="86" y="226" fill="#7b543a" font-size="13" font-weight="800" letter-spacing="1.4">CLIENT</text>
    <text x="86" y="262" fill="#17231d" font-size="24" font-weight="800">Outreach form</text>
    <text x="86" y="294" fill="#52655a" font-size="15">Company, mode, role,</text>
    <text x="86" y="316" fill="#52655a" font-size="15">and reason to write</text>

    <rect x="328" y="180" width="196" height="144" rx="18" fill="#fffaf0" stroke="#dfc9aa"/>
    <text x="356" y="226" fill="#7b543a" font-size="13" font-weight="800" letter-spacing="1.4">SERVER ROUTE</text>
    <text x="356" y="262" fill="#17231d" font-size="24" font-weight="800">/api/draft</text>
    <text x="356" y="294" fill="#52655a" font-size="15">Payload limit, JSON</text>
    <text x="356" y="316" fill="#52655a" font-size="15">parsing and errors</text>

    <rect x="598" y="180" width="196" height="144" rx="18" fill="#fffaf0" stroke="#dfc9aa"/>
    <text x="626" y="226" fill="#7b543a" font-size="13" font-weight="800" letter-spacing="1.4">CONTRACT</text>
    <text x="626" y="262" fill="#17231d" font-size="24" font-weight="800">Zod schemas</text>
    <text x="626" y="294" fill="#52655a" font-size="15">Input and output are</text>
    <text x="626" y="316" fill="#52655a" font-size="15">validated as data</text>

    <rect x="868" y="108" width="242" height="132" rx="18" fill="#263a31" stroke="#263a31"/>
    <text x="900" y="153" fill="#d8e7d0" font-size="13" font-weight="800" letter-spacing="1.4">DEFAULT</text>
    <text x="900" y="188" fill="#fffaf0" font-size="24" font-weight="800">Mock provider</text>
    <text x="900" y="218" fill="#d8e7d0" font-size="15">No model cost, no key</text>

    <rect x="868" y="292" width="242" height="132" rx="18" fill="#fffaf0" stroke="#dfc9aa"/>
    <text x="900" y="337" fill="#7b543a" font-size="13" font-weight="800" letter-spacing="1.4">OPTIONAL</text>
    <text x="900" y="372" fill="#17231d" font-size="24" font-weight="800">OpenAI provider</text>
    <text x="900" y="402" fill="#52655a" font-size="15">Server-side, structured</text>
  </g>

  <g fill="none" stroke="#315a49" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.82">
    <path d="M254 252 H328"/>
    <path d="M514 252 H598"/>
    <path d="M794 252 C826 252 836 174 868 174"/>
    <path d="M794 252 C826 252 836 358 868 358"/>
    <path d="M318 242 l10 10 l-10 10"/>
    <path d="M588 242 l10 10 l-10 10"/>
    <path d="M858 164 l10 10 l-10 10"/>
    <path d="M858 348 l10 10 l-10 10"/>
  </g>

  <g transform="translate(58 460)">
    <rect x="0" y="-8" width="1084" height="1" fill="#d6c5a7"/>
    <text x="0" y="34" fill="#17231d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Visible provenance</text>
    <text x="190" y="34" fill="#52655a" font-family="Inter, Arial, sans-serif" font-size="18">provider, model, prompt version and context used</text>
  </g>
</svg>
